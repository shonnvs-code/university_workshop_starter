version: 2

models:

  - name: dim_products
    description: >
      One row per product on the Jaffle Shop menu.
      Contains product name, type (jaffle or beverage), price, and description.
    columns:
      - name: sku
        description: Primary key. Unique product code (e.g. JAF-001, BEV-004).
        tests:
          - unique
          - not_null

      - name: name
        description: Human-readable product name.
        tests:
          - not_null

      - name: type
        description: Product category — either 'jaffle' or 'beverage'.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['jaffle', 'beverage']

      - name: price
        description: Retail price in cents (e.g. 1100 = $11.00).
        tests:
          - not_null

      - name: description
        description: Menu description of the product.

  - name: fct_product_sales
    description: >
      One row per product. Aggregates total units sold and total revenue
      across all orders. Use this model to answer which products are most
      popular and which drive the most revenue.
    columns:
      - name: sku
        description: Primary key. Unique product code.
        tests:
          - unique
          - not_null

      - name: name
        description: Product name.
        tests:
          - not_null

      - name: type
        description: Product category — jaffle or beverage.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['jaffle', 'beverage']

      - name: price
        description: Unit price in cents.
        tests:
          - not_null

      - name: units_sold
        description: Total number of units sold across all orders.
        tests:
          - not_null

      - name: total_revenue
        description: Total revenue generated (units_sold x price) in cents.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"
              name: assert_positive_revenue

  - name: fct_store_revenue
    description: >
      One row per store. Aggregates total orders and revenue across all orders.
      Use this to identify which store locations drive the most revenue.
    columns:
      - name: store_id
        description: Primary key. Unique store identifier.
        tests:
          - unique
          - not_null

      - name: store_name
        description: Human-readable store location name.
        tests:
          - not_null

      - name: tax_rate
        description: Tax rate applied at this store location.

      - name: total_orders
        description: Total number of orders placed at this store.
        tests:
          - not_null

      - name: total_subtotal
        description: Sum of all order subtotals before tax (cents).

      - name: total_tax_paid
        description: Sum of all tax paid across orders (cents).

      - name: total_revenue
        description: Sum of all order totals including tax (cents).
        tests:
          - not_null